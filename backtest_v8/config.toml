# Backtest V8 default config.
# All paths are resolved relative to this config file unless absolute.

[market]
symbol = "BTCUSD"
asset_class = "crypto"
quote_currency = "USD"
data_path = "../flect_mt5/cache/btc"
timeframes = ["M5", "M6", "M10", "M12", "M15", "M20", "M30", "H1", "H2", "H3", "H4", "H6", "H8", "H12", "D1", "W1", "MN1"]
preferred_timeframes = ["M5", "M6", "M10", "M12", "M15", "M20", "M30"]
daily_trade_timeframes = ["M5", "M6", "M10", "M12", "M15", "M20", "M30"]
start = "2021-05-31"
end = "2026-06-05"

[tradingview_reference]
raw_pine_dir = "../ref/tradingview"

[costs]
fee_per_side = 0.00035
slippage_per_side = 0.00010

[execution]
initial_equity = 1000.0          # von khoi diem (USD) - chi de ve equity curve, khong anh huong % lai/lo hay xep hang setup
position_size_pct = 0.3          # ti le von dung moi lenh (1.0 = 100% all-in). giam xuong vd 0.5 de half-kelly
allow_long = true                # bat/tat lenh long toan bo run. side_modes trong optimization van filter rieng tung setup
allow_short = true               # bat/tat lenh short toan bo run
entry_lag_bars = 1               # tre vao lenh: signal bar T -> vao lenh o open bar T+1. KHONG duoc dat = 0 (lookahead bias)
same_bar_exit_priority = "sl"    # cung bar cham ca SL va TP: "sl" uu tien dung lo (sat thuc te) | "tp" uu tien chot loi (dep hon nhung ao)
signal_conflict = "skip"         # dong thoi co ca long va short signal: "skip" bo qua ca 2 | "long" uu tien long | "short" uu tien short

[validation]
train_end = "2024-12-31"
oos_start = "2025-01-01"
min_oos_trades = 40
min_oos_months = 12
min_oos_profit_factor = 1.40
min_oos_avg_monthly_return = 0.015
max_train_oos_monthly_gap = 0.25

# target loi nhuan ~20%/thang, drawdown < 22%, winrate > 45%
[targets]
description = "winrate >= 70%, PF >= 1.3"  #"raw monthly return 10-20%/month"
monthly_return_min = 0.0001                #0.10
monthly_return_preferred = 0.20
monthly_return_max = 10.0                  # 0.20
min_trades_per_month = 1.0
max_trades_per_month = 35.0
max_drawdown = 0.22
min_winrate = 0.70                         # 0.45

# target loi nhuan ~20%/thang, drawdown < 22%, winrate > 45%
# [targets.achievement]
# full_avg_monthly_return_min = 0.10
# oos_avg_monthly_return_min = 0.10
# full_avg_monthly_return_max = 0.20

# target winrate >= 70%, PF >= 1.3
[targets.achievement]
full_winrate_min = 0.70
oos_winrate_min = 0.65
full_profit_factor_min = 1.30
oos_profit_factor_min = 1.30

[hard_filters]
full_min_avg_monthly_return = 0.0001            # month 0.02
train_min_avg_monthly_return = 0.0001           # month 0.015
oos_min_avg_monthly_return = 0.0001             # month 0.015
oos_min_trades = 20                             # Số lệnh tối thiểu ở OOS 
oos_min_months = 12
oos_min_profit_factor = 1.40                    # Yêu cầu Profit Factor OOS tối thiểu xx
full_min_profit_factor = 1.30
oos_max_no_trade_month_ratio = 0.10             # Cho phép tối đa xx% số tháng không có giao dịch
full_max_no_trade_month_ratio = 0.15
full_max_drawdown = 0.22
oos_max_drawdown = 0.18

[filters]
min_total_trades = 80                           # Tổng số lệnh trong 5 năm tối thiểu
min_profit_factor = 1.30
min_avg_monthly_return_to_keep = 0.02
max_no_trade_month_ratio = 0.15
max_top_trade_profit_share = 0.45
max_top2_trade_profit_share = 0.65
max_monthly_return_std = 0.45
min_take_profit_cost_multiple = 2.5
enable_oos_too_beautiful_filter = true
max_oos_train_return_ratio_with_limited_trades = 2.5
limited_trades_for_oos_ratio_check = 160
near_miss_max_fail_count = 3
near_miss_min_avg_monthly_return = 0.01
near_miss_min_oos_trades = 20

[data_quality]
max_gap_count_warn = 20
max_missing_bar_ratio_warn = 0.05
large_gap_score_penalty = 35.0
crypto_weekend_gap_note = true

[optimization.default_grid]
stop_loss_pct = [0.015, 0.020, 0.030]
take_profit_pct = [0.015, 0.030, 0.050, 0.080]
max_hold_bars = [8, 12, 24]
side_modes = ["both", "long_only", "short_only"]

[optimization.timeframe_grids.D1]
stop_loss_pct = [0.030, 0.040, 0.060]
take_profit_pct = [0.030, 0.060, 0.100]
max_hold_bars = [3, 5, 10]
side_modes = ["both", "long_only", "short_only"]

[scoring.weights]
monthly_return_fit = 30.0
trade_frequency = 15.0
drawdown = 15.0
oos = 20.0
smoothness = 10.0
profit_factor = 7.0
winrate = 3.0
risk_penalty = 25.0
target_shortfall_penalty = 35.0
timeframe_penalty = 15.0
gap_penalty = 35.0

[scoring.params]
profit_factor_score_min = 1.30
profit_factor_score_max = 2.50
winrate_score_max = 0.75
oos_return_score_target = 0.10
oos_profit_factor_score_max = 2.20
oos_trade_score_multiplier = 3.0
oos_train_gap_penalty_max = 0.12
oos_return_score_weight = 0.40
oos_profit_factor_score_weight = 0.35
oos_trade_score_weight = 0.25
oos_train_gap_penalty_weight = 0.30
risk_penalty_full_drawdown_weight = 0.25
risk_penalty_oos_drawdown_weight = 0.20
risk_penalty_no_trade_weight = 0.20
risk_penalty_concentration_weight = 0.15
risk_penalty_oos_luck_weight = 0.10
risk_penalty_pf_low_trades_weight = 0.10
timeframe_low_oos_trades = 60
timeframe_low_avg_trades_per_month = 2.0
timeframe_low_trade_penalty = 1.0
timeframe_default_penalty = 0.35

[warning_thresholds]
warn_above_monthly_return_max = true
high_profit_factor = 3.0
high_profit_factor_max_full_trades = 160
high_oos_profit_factor = 3.0
high_oos_profit_factor_max_trades = 80
profit_concentration_notice_share = 0.30
many_inactive_months_ratio = 0.10
oos_much_better_than_train_ratio = 2.0
oos_much_weaker_than_train_ratio = 0.50
smoothness_r2_min = 0.25
warn_non_preferred_timeframe = true

[risk]
low_max_full_drawdown = 0.12
low_max_top_trade_profit_share = 0.22
low_min_oos_avg_monthly_return = 0.015
low_max_full_no_trade_month_ratio = 0.10
high_max_full_drawdown = 0.22
high_max_oos_drawdown = 0.18
high_max_top_trade_profit_share = 0.35
high_oos_avg_monthly_return_below = 0.0

[reporting]
top_n_terminal = 5
top_n_detail = 10
save_all_rejected = true
near_miss_top_n = 25
suspicious_top_n = 25

[indicators.ibs_reversion]
enabled = true
ibs_low = [0.05, 0.10, 0.15]
ibs_high = [0.85, 0.90, 0.95]
regime = ["cycle", "range"]
adx_max = [20]
ema_fast = [50]
ema_slow = [200]

[indicators.bb_rsi_reversion]
enabled = true
window = [20, 40]
std_mult = [2.0, 2.2]
rsi_low = [30, 35]
rsi_high = [65, 70]
regime = ["cycle", "range"]
adx_max = [20]
ema_fast = [50]
ema_slow = [200]

[indicators.donchian_breakout]
enabled = true
window = [20, 40, 80]
adx_min = [18, 24]
ema_fast = [50]
ema_slow = [200]
require_cycle = [true]

[indicators.ema_reject_pullback]
enabled = true
fast_ema = [20, 34]
slow_ema = [200]
rsi_low = [35, 40]
rsi_high = [60, 65]
atr_mult = [0.8]
adx_min = [12]

[indicators.wavetrend_cross]
enabled = true
channel_len = [10, 14]
average_len = [21]
overbought = [53, 60]
oversold = [-53, -60]
trend_ema = [200]
use_trend_filter = [true]

[indicators.williams_vix_fix]
enabled = true
lookback = [22]
bb_length = [20]
bb_mult = [2.0]
percentile_lookback = [50]
percentile_high = [0.85]
trend_ema = [200]

[indicators.squeeze_momentum]
enabled = true
length = [20]
bb_mult = [2.0]
kc_length = [20]
kc_mult = [1.5]
trend_ema = [200]

[indicators.supertrend_flip]
enabled = true
atr_period = [10]
multiplier = [2.0, 3.0]
change_atr = [true]

[indicators.macd_cross]
enabled = true
fast = [12]
slow = [26]
signal = [9]
trend_ema = [200]
use_trend_filter = [true]

[indicators.adx_ema_trend]
enabled = true
ema_fast = [20, 50]
ema_mid = [50, 100]
ema_slow = [200]
di_length = [14]
adx_smoothing = [14]
adx_threshold = [20, 25]

[indicators.signal_forge_lite]
enabled = false
require_all = [true]
use_sma = [true]
use_rsi = [true]
use_macd = [true]
use_supertrend = [false]
use_bb = [false]
use_ema = [true]
use_adx = [true]
sma_fast = [10]
sma_slow = [20]
rsi_length = [14]
rsi_long_level = [50]
rsi_short_level = [50]
macd_fast = [12]
macd_slow = [26]
macd_signal = [9]
supertrend_atr_period = [10]
supertrend_multiplier = [3.0]
bb_length = [20]
bb_mult = [2.0]
ema_fast = [10]
ema_slow = [20]
adx_length = [14]
di_length = [14]
adx_threshold = [20]
